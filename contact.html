<!DOCTYPE html>
<html>

<head>

<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<div class="max-w-4xl mx-auto py-20 px-6">

<h1 class="text-4xl font-bold mb-10">

Contact Us

</h1>

<form class="space-y-6">

<input type="text"
placeholder="Name"
class="w-full border p-3 rounded">

<input type="email"
placeholder="Email"
class="w-full border p-3 rounded">

<textarea
placeholder="Message"
class="w-full border p-3 rounded"></textarea>

<button
class="bg-teal-600 text-white px-6 py-3 rounded">

Send Message

</button>

</form>

</div>

</body>

</html>
